<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dukaan OS - Founder Command Console</title>
  
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --primary: #5f259f;
      --secondary: #2563eb;
      --accent: #ff9900;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --background: #f4f5f7;
      --border-thick: #111111;
      --radius-md: 8px;
      --radius-lg: 12px;
      --shadow-flat: 4px 4px 0px 0px #111111;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', 'Inter', sans-serif;
    }

    body {
      background-color: var(--background);
      color: #1f2937;
      padding: 20px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .phone-frame {
      width: 100%;
      max-width: 450px;
      height: 820px;
      background-color: #ffffff;
      border: 6px solid var(--border-thick);
      border-radius: 36px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), var(--shadow-flat);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .phone-notch {
      width: 130px;
      height: 20px;
      background-color: var(--border-thick);
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      z-index: 10001;
    }

    .screen-content {
      flex: 1;
      overflow-y: auto;
      padding: 50px 16px 20px 16px;
      background-color: #ffffff;
    }

    .header-bar {
      background-color: #dc2626; /* Red Header for Admin console */
      color: #ffffff;
      padding: 14px 16px;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      border-bottom: 2px solid var(--border-thick);
      padding-top: 18px;
      font-weight: 900;
      font-size: 16px;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 2px solid var(--border-thick);
      cursor: pointer;
      font-size: 13px;
      text-align: center;
      gap: 6px;
    }

    .btn:active {
      transform: translateY(2px);
    }

    .btn-block {
      width: 100%;
    }

    .btn-primary {
      background-color: var(--primary);
      color: #ffffff;
    }

    .btn-accent {
      background-color: var(--accent);
      color: var(--border-thick);
    }

    .btn-secondary {
      background-color: #ffffff;
      color: var(--border-thick);
    }

    .form-input {
      width: 100%;
      padding: 8px;
      border: 2px solid var(--border-thick);
      border-radius: var(--radius-md);
      outline: none;
      font-size: 13px;
      background-color: #f9fafb;
    }

    .card {
      background-color: #ffffff;
      border: 2px solid var(--border-thick);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin-bottom: 14px;
    }

    .card-shadow {
      box-shadow: var(--shadow-flat);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .tab-bar {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--border-thick);
      margin-bottom: 14px;
      overflow-x: auto;
    }

    .tab-btn {
      flex: 1;
      padding: 6px;
      font-size: 11px;
      font-weight: 800;
      border: 2px solid var(--border-thick);
      border-bottom: none;
      background-color: #e5e7eb;
      cursor: pointer;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      text-align: center;
    }

    .tab-btn.active {
      background-color: #111111;
      color: #ffffff;
    }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      font-size: 8px;
      font-weight: 800;
      border-radius: 4px;
      border: 1px solid var(--border-thick);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <div class="phone-notch"></div>
    <header class="header-bar">DUKAAN OS FOUNDER CONTROL</header>
    
    <div class="screen-content">

      <!-- LOCK SCREEN GATE -->
      <div id="adminLockScreen" class="card card-shadow" style="margin-top: 60px; padding: 20px 16px; text-align: center;">
        <i data-lucide="key" style="color:var(--danger); width:40px; height:40px; margin:0 auto 10px;"></i>
        <h3 style="font-size:16px; font-weight:900; margin-bottom:4px; text-transform:uppercase;">FOUNDER GATEKEEPER</h3>
        <p style="font-size:11px; color:#666; margin-bottom:16px;">Access pin is required to configure store directories.</p>
        
        <input type="password" id="admPasscodeInput" class="form-input text-center" style="font-size: 16px; letter-spacing:8px; font-weight:bold; margin-bottom:12px;" placeholder="••••••••">
        <button class="btn btn-primary btn-block" onclick="verifyAdminGate()">Submit Access Key</button>
      </div>

      <!-- MAIN DASHBOARD CONTENT -->
      <div id="adminDashboard" style="display:none; margin-top: 20px;">
        
        <!-- Metrics -->
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:12px;">
          <div class="card card-shadow" style="padding:8px; margin-bottom:0; font-size:11px;">
            <span style="color:#666; font-weight:700;">Gross Sales</span>
            <div style="font-size:14px; font-weight:900; color:#10b981;">₹<span id="admSales">0</span></div>
          </div>
          <div class="card card-shadow" style="padding:8px; margin-bottom:0; font-size:11px;">
            <span style="color:#666; font-weight:700;">Platform Profit (0.25%)</span>
            <div style="font-size:14px; font-weight:900; color:var(--primary);">₹<span id="admProfit">0.00</span></div>
          </div>
        </div>

        <div class="tab-bar">
          <button id="tabBtnShops" class="tab-btn active" onclick="switchAdminTab('shops')">Shops</button>
          <button id="tabBtnProducts" class="tab-btn" onclick="switchAdminTab('products')">Products</button>
          <button id="tabBtnBookings" class="tab-btn" onclick="switchAdminTab('bookings')">Bookings</button>
          <button id="tabBtnShoppers" class="tab-btn" onclick="switchAdminTab('shoppers')">Shoppers</button>
        </div>

        <!-- SHOPS TAB -->
        <div id="tabShops" class="adm-tab-view">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h4 style="font-size:12px; font-weight:900; text-transform:uppercase;">Manage Shops</h4>
            <button class="btn btn-accent" style="padding:3px 8px; font-size:10px;" onclick="toggleAddShopForm()">+ Create Shop</button>
          </div>

          <!-- Create Shop Form -->
          <form id="addShopForm" style="display:none; padding:10px; margin-bottom:12px; background:#f9fafb; font-size:11px;" class="card" onsubmit="adminCreateShop(event)">
            <div style="margin-bottom:6px;">
              <label style="font-size:9px; font-weight:800; display:block;">Shop Name</label>
              <input type="text" id="addShopName" class="form-input" required>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;">
              <div>
                <label style="font-size:9px; font-weight:800; display:block;">Slug (id)</label>
                <input type="text" id="addShopSlug" placeholder="sharmaagro" class="form-input" required>
              </div>
              <div>
                <label style="font-size:9px; font-weight:800; display:block;">Plan</label>
                <select id="addShopPlan" class="form-input" style="background:#fff;">
                  <option value="Free">Free</option>
                  <option value="Pro">Pro</option>
                  <option value="Business">Business</option>
                </select>
              </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;">
              <div>
                <label style="font-size:9px; font-weight:800; display:block;">Owner Name</label>
                <input type="text" id="addShopOwner" class="form-input" required>
              </div>
              <div>
                <label style="font-size:9px; font-weight:800; display:block;">Owner Phone</label>
                <input type="text" id="addShopPhone" class="form-input" required>
              </div>
            </div>
            <div style="margin-bottom:6px;">
              <label style="font-size:9px; font-weight:800; display:block;">Address</label>
              <input type="text" id="addShopAddress" class="form-input" required>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;">
              <div>
                <label style="font-size:9px; font-weight:800; display:block;">Latitude</label>
                <input type="text" id="addShopLat" value="29.3250" class="form-input">
              </div>
              <div>
                <label style="font-size:9px; font-weight:800; display:block;">Longitude</label>
                <input type="text" id="addShopLng" value="76.3150" class="form-input">
              </div>
            </div>
            <div style="margin-bottom:6px;">
              <label style="font-size:9px; font-weight:800; display:block;">Logo URL</label>
              <input type="text" id="addShopLogo" placeholder="https://..." class="form-input">
            </div>
            <div style="margin-bottom:6px;">
              <label style="font-size:9px; font-weight:800; display:block;">Banner URL</label>
              <input type="text" id="addShopBanner" placeholder="https://..." class="form-input">
            </div>
            <div style="margin-bottom:10px;">
              <label style="font-size:9px; font-weight:800; display:block;">External Website URL (Optional)</label>
              <input type="text" id="addShopWebUrl" placeholder="https://..." class="form-input">
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="padding:6px;">Save Shop configurations</button>
          </form>

          <div id="adminShopsList" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

        <!-- PRODUCTS TAB -->
        <div id="tabProducts" class="adm-tab-view" style="display:none;">
          <h4 style="font-size:12px; font-weight:900; text-transform:uppercase; margin-bottom:10px;">Products catalog</h4>
          <div id="adminProductsList" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

        <!-- BOOKINGS TAB -->
        <div id="tabBookings" class="adm-tab-view" style="display:none;">
          <h4 style="font-size:12px; font-weight:900; text-transform:uppercase; margin-bottom:10px;">Reservations Log</h4>
          <div id="adminReservationsList" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

        <!-- SHOPPERS TAB -->
        <div id="tabShoppers" class="adm-tab-view" style="display:none;">
          <h4 style="font-size:12px; font-weight:900; text-transform:uppercase; margin-bottom:10px;">Shoppers wallets</h4>
          <div id="adminShoppersList" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

      </div>

    </div>
  </div>

  <script>
    // LocalStorage DB Sync
    const db = {
      get(key) { return JSON.parse(localStorage.getItem('dos_' + key) || '[]'); },
      save(key, val) { localStorage.setItem('dos_' + key, JSON.stringify(val)); }
    };

    let activeTab = 'shops';

    function verifyAdminGate() {
      const pin = document.getElementById('admPasscodeInput').value;
      if (pin === 'ABHInonu01') {
        document.getElementById('adminLockScreen').style.display = 'none';
        document.getElementById('adminDashboard').style.display = 'block';
        renderAdminDashboard();
      } else {
        alert("Incorrect Pin");
      }
    }

    function switchAdminTab(tabKey) {
      activeTab = tabKey;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.adm-tab-view').forEach(view => view.style.display = 'none');

      if (tabKey === 'shops') {
        document.getElementById('tabBtnShops').classList.add('active');
        document.getElementById('tabShops').style.display = 'block';
      } else if (tabKey === 'products') {
        document.getElementById('tabBtnProducts').classList.add('active');
        document.getElementById('tabProducts').style.display = 'block';
      } else if (tabKey === 'bookings') {
        document.getElementById('tabBtnBookings').classList.add('active');
        document.getElementById('tabBookings').style.display = 'block';
      } else if (tabKey === 'shoppers') {
        document.getElementById('tabBtnShoppers').classList.add('active');
        document.getElementById('tabShoppers').style.display = 'block';
      }
      renderAdminDashboard();
    }

    function toggleAddShopForm() {
      const form = document.getElementById('addShopForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function renderAdminDashboard() {
      const shops = db.get('shops');
      const products = db.get('products');
      const reservations = db.get('reservations');
      const customers = db.get('customers');

      const confirmed = reservations.filter(r => r.status === 'confirmed');
      const totalSales = confirmed.reduce((sum, r) => sum + r.price, 0);

      document.getElementById('admSales').innerText = totalSales;
      document.getElementById('admProfit').innerText = (totalSales * 0.0025).toFixed(2);

      if (activeTab === 'shops') {
        const container = document.getElementById('adminShopsList');
        container.innerHTML = '';
        if (shops.length === 0) {
          container.innerHTML = `<div style="text-align:center; padding:20px; font-size:12px; color:#666;">No shops registered. Add one above!</div>`;
          return;
        }

        shops.forEach(shop => {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.padding = '10px';
          card.innerHTML = `
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:4px; margin-bottom:6px; font-size:11px; font-weight:800;">
              <span>${shop.name}</span>
              <span style="color:#dc2626;">${shop.id}</span>
            </div>
            <div style="font-size:11px; color:#555; margin-bottom:6px;">
              Owner: ${shop.owner} | Phone: ${shop.phone}<br/>
              Address: ${shop.address}<br/>
              Plan: <strong>${shop.plan}</strong> | Buyers: ${shop.monthlyBuyers} | Rating: ${shop.rating}
              ${shop.websiteURL ? `<br/><span style="color:var(--primary); font-weight:bold;">Link: ${shop.websiteURL}</span>` : ''}
            </div>
            
            <div style="border-top:1px dashed #eee; padding-top:6px; font-size:10px; display:grid; grid-template-columns:1fr 1fr; gap:4px; font-weight:bold;">
              <label><input type="checkbox" ${shop.sponsored?'checked':''} onchange="admToggleFlag('${shop.id}', 'sponsored')"> Sponsored</label>
              <label><input type="checkbox" ${shop.topPartner?'checked':''} onchange="admToggleFlag('${shop.id}', 'topPartner')"> Top Partner</label>
              <label><input type="checkbox" ${shop.verified?'checked':''} onchange="admToggleFlag('${shop.id}', 'verified')"> Verified</label>
              <label><input type="checkbox" ${shop.featured?'checked':''} onchange="admToggleFlag('${shop.id}', 'featured')"> Featured</label>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:6px; margin-top:8px;">
              <button class="btn btn-danger" style="padding:2px 6px; font-size:9px;" onclick="admDeleteShop('${shop.id}')">Delete</button>
            </div>
          `;
          container.appendChild(card);
        });
      } else if (activeTab === 'products') {
        const container = document.getElementById('adminProductsList');
        container.innerHTML = '';
        if (products.length === 0) {
          container.innerHTML = `<div style="text-align:center; padding:20px; font-size:12px; color:#666;">No products registered in the network.</div>`;
          return;
        }

        products.forEach(p => {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.padding = '8px';
          card.style.fontSize = '12px';
          card.innerHTML = `
            <strong>${p.name}</strong>
            <div style="color:#666; font-size:10px;">Store: ${p.shopName} | Price: ₹${p.price} | Stock: ${p.stockStatus}</div>
            <div style="display:flex; justify-content:flex-end; margin-top:4px;">
              <button class="btn btn-danger" style="padding:2px 6px; font-size:9px;" onclick="admDeleteProduct('${p.id}')">Delete</button>
            </div>
          `;
          container.appendChild(card);
        });
      } else if (activeTab === 'bookings') {
        const container = document.getElementById('adminReservationsList');
        container.innerHTML = '';
        if (reservations.length === 0) {
          container.innerHTML = `<div style="text-align:center; padding:20px; font-size:12px; color:#666;">No reservations booked yet.</div>`;
          return;
        }

        reservations.forEach(r => {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.padding = '10px';
          card.style.fontSize = '11px';
          card.innerHTML = `
            <div style="display:flex; justify-content:space-between; font-weight:800; border-bottom:1px solid #eee; padding-bottom:4px; margin-bottom:4px;">
              <span>TICKET: ${r.id}</span>
              <span style="text-transform:uppercase; color:var(--primary);">${r.status}</span>
            </div>
            <strong>${r.productName}</strong><br/>
            Shop: ${r.shopName} | Customer: ${r.customerName}<br/>
            Price: ₹${r.price} | Reward: +${r.rewardCoins} coins | Commission (0.5%): ₹${(r.price * 0.005).toFixed(2)}
          `;
          container.appendChild(card);
        });
      } else if (activeTab === 'shoppers') {
        const container = document.getElementById('adminShoppersList');
        container.innerHTML = '';
        if (customers.length === 0) {
          container.innerHTML = `<div style="text-align:center; padding:20px; font-size:12px; color:#666;">No customer profile registered yet.</div>`;
          return;
        }

        customers.forEach(c => {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.padding = '8px';
          card.style.fontSize = '12px';
          card.innerHTML = `
            <strong>${c.name}</strong> (${c.phone})
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:4px;">
              <span>SuperCoins Balance:</span>
              <span class="badge" style="background:#fef3c7; color:#b45309; border-color:#b45309;">🪙 ${c.superCoins || 0} Coins</span>
            </div>
          `;
          container.appendChild(card);
        });
      }
    }

    function adminCreateShop(e) {
      e.preventDefault();
      const name = document.getElementById('addShopName').value;
      const slug = document.getElementById('addShopSlug').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
      const owner = document.getElementById('addShopOwner').value;
      const phone = document.getElementById('addShopPhone').value;
      const address = document.getElementById('addShopAddress').value;
      const plan = document.getElementById('addShopPlan').value;
      const lat = parseFloat(document.getElementById('addShopLat').value) || 29.3250;
      const lng = parseFloat(document.getElementById('addShopLng').value) || 76.3150;
      const logo = document.getElementById('addShopLogo').value || "https://images.unsplash.com/photo-1530268729831-4b0b9e170218?auto=format&fit=crop&q=80&w=400";
      const banner = document.getElementById('addShopBanner').value || "https://images.unsplash.com/photo-1595974482597-4b8da8879bc5?auto=format&fit=crop&q=80&w=800";
      const webUrl = document.getElementById('addShopWebUrl').value.trim() || null;

      if (!name || !slug || !owner || !phone || !address) return;

      const shops = db.get('shops');
      if (shops.some(s => s.id === slug)) {
        alert("Shop slug ID already exists!");
        return;
      }

      shops.push({
        id: slug,
        name,
        owner,
        phone,
        address,
        lat,
        lng,
        monthlyBuyers: 0,
        rating: 4.0,
        plan,
        sponsored: false,
        topPartner: false,
        verified: true,
        featured: false,
        banner,
        logo,
        websiteURL: webUrl
      });

      db.save('shops', shops);

      // Reset Form
      document.getElementById('addShopName').value = '';
      document.getElementById('addShopSlug').value = '';
      document.getElementById('addShopOwner').value = '';
      document.getElementById('addShopPhone').value = '';
      document.getElementById('addShopAddress').value = '';
      document.getElementById('addShopWebUrl').value = '';
      toggleAddShopForm();

      renderAdminDashboard();
    }

    function admToggleFlag(shopId, flagKey) {
      const shops = db.get('shops');
      const idx = shops.findIndex(s => s.id === shopId);
      if (idx !== -1) {
        shops[idx][flagKey] = !shops[idx][flagKey];
        db.save('shops', shops);
      }
      renderAdminDashboard();
    }

    function admDeleteShop(shopId) {
      if (confirm("Delete this shop and all its items?")) {
        const shops = db.get('shops').filter(s => s.id !== shopId);
        db.save('shops', shops);

        const products = db.get('products').filter(p => p.shopId !== shopId);
        db.save('products', products);

        renderAdminDashboard();
      }
    }

    function admDeleteProduct(prodId) {
      if (confirm("Delete this product spare?")) {
        const products = db.get('products').filter(p => p.id !== prodId);
        db.save('products', products);
        renderAdminDashboard();
      }
    }

    window.onload = () => {
      lucide.createIcons();
    };
  </script>
</body>
</html>
