<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dukaan OS - Merchant Dashboard</title>
  
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --primary: #5f259f;
      --secondary: #2563eb;
      --accent: #ff9900;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --background: #f4f5f7;
      --border-thick: #111111;
      --radius-md: 8px;
      --radius-lg: 12px;
      --shadow-flat: 4px 4px 0px 0px #111111;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', 'Inter', sans-serif;
    }

    body {
      background-color: var(--background);
      color: #1f2937;
      padding: 20px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .phone-frame {
      width: 100%;
      max-width: 450px;
      height: 820px;
      background-color: #ffffff;
      border: 6px solid var(--border-thick);
      border-radius: 36px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), var(--shadow-flat);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .phone-notch {
      width: 130px;
      height: 20px;
      background-color: var(--border-thick);
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      z-index: 10001;
    }

    .screen-content {
      flex: 1;
      overflow-y: auto;
      padding: 50px 16px 20px 16px;
      background-color: #ffffff;
    }

    .header-bar {
      background-color: var(--primary);
      color: #ffffff;
      padding: 14px 16px;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      border-bottom: 2px solid var(--border-thick);
      padding-top: 18px;
      font-weight: 900;
      font-size: 16px;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 2px solid var(--border-thick);
      cursor: pointer;
      font-size: 13px;
      text-align: center;
      gap: 6px;
    }

    .btn:active {
      transform: translateY(2px);
    }

    .btn-block {
      width: 100%;
    }

    .btn-primary {
      background-color: var(--primary);
      color: #ffffff;
    }

    .btn-accent {
      background-color: var(--accent);
      color: var(--border-thick);
    }

    .btn-secondary {
      background-color: #ffffff;
      color: var(--border-thick);
    }

    .btn-success {
      background-color: var(--success);
      color: white;
    }

    .btn-danger {
      background-color: var(--danger);
      color: white;
    }

    .form-input {
      width: 100%;
      padding: 8px;
      border: 2px solid var(--border-thick);
      border-radius: var(--radius-md);
      outline: none;
      font-size: 13px;
      background-color: #f9fafb;
    }

    .card {
      background-color: #ffffff;
      border: 2px solid var(--border-thick);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin-bottom: 14px;
    }

    .card-shadow {
      box-shadow: var(--shadow-flat);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .tab-bar {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--border-thick);
      margin-bottom: 14px;
    }

    .tab-btn {
      flex: 1;
      padding: 6px;
      font-size: 11px;
      font-weight: 800;
      border: 2px solid var(--border-thick);
      border-bottom: none;
      background-color: #e5e7eb;
      cursor: pointer;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      text-align: center;
    }

    .tab-btn.active {
      background-color: #111111;
      color: #ffffff;
    }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      font-size: 8px;
      font-weight: 800;
      border-radius: 4px;
      border: 1px solid var(--border-thick);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <div class="phone-notch"></div>
    <header class="header-bar">DUKAAN OS MERCHANT BOARD</header>
    
    <div class="screen-content" style="margin-top: 20px;">

      <!-- Select shop -->
      <div style="margin-bottom: 12px; display: flex; gap: 6px; align-items: center; background:#f3f4f6; padding: 6px; border-radius: 6px; border:1px solid #111;">
        <span style="font-size:10px; font-weight:800; color:#666;">Store:</span>
        <select id="shopkeeperSelector" class="form-input" style="padding: 4px; font-size: 12px; border:1px solid #111;" onchange="changeStore(this.value)">
          <option value="">-- Choose Store --</option>
        </select>
      </div>

      <div id="merchantDashboard" style="display:none;">
        <!-- Website link -->
        <div class="card" style="padding:8px; display:flex; justify-content:space-between; align-items:center; font-size:11px; margin-bottom:12px;">
          <div>
            <span style="color:#666; font-size:8px; text-transform:uppercase; display:block;">Website Link</span>
            <a href="#" id="skWebsiteLink" onclick="return false;" style="color:var(--primary); font-weight:bold; text-decoration:underline;">dukaanos.in/shop/</a>
          </div>
          <span id="skPlanBadge" class="badge" style="background:#ddd; border-color:#555;">Plan</span>
        </div>

        <!-- Metrics -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
          <div class="card card-shadow" style="padding: 8px; margin-bottom: 0;">
            <div style="font-size: 9px; font-weight: 800; color: #666; text-transform: uppercase;">Sales Completed</div>
            <strong style="font-size: 15px; color: #10b981;">₹<span id="skSales">0</span></strong>
          </div>
          <div class="card card-shadow" style="padding: 8px; margin-bottom: 0;">
            <div style="font-size: 9px; font-weight: 800; color: #ef4444; text-transform: uppercase;">Commission (0.5%)</div>
            <strong style="font-size: 15px; color: #ef4444;">₹<span id="skCommission">0.00</span></strong>
          </div>
        </div>

        <!-- Stats breakdown -->
        <h3 style="font-size: 11px; font-weight: 900; color:#666; text-transform: uppercase; margin-bottom:6px;">📊 Ticket Stats</h3>
        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:4px; text-align:center; font-size:10px; font-weight:bold; margin-bottom:14px;">
          <div style="background:#e0f2fe; border:1px solid #111; border-radius:4px; padding:2px;">
            <span id="skStatReserved" style="display:block; font-weight:900;">0</span>
            <span style="font-size:7px; color:#555; text-transform:uppercase;">Reserved</span>
          </div>
          <div style="background:#fef3c7; border:1px solid #111; border-radius:4px; padding:2px;">
            <span id="skStatVisited" style="display:block; font-weight:900;">0</span>
            <span style="font-size:7px; color:#555; text-transform:uppercase;">Visited</span>
          </div>
          <div style="background:#d1fae5; border:1px solid #111; border-radius:4px; padding:2px;">
            <span id="skStatConfirmed" style="display:block; font-weight:900; color:#10b981;">0</span>
            <span style="font-size:7px; color:#555; text-transform:uppercase;">Confirmed</span>
          </div>
          <div style="background:#fee2e2; border:1px solid #111; border-radius:4px; padding:2px;">
            <span id="skStatCancelled" style="display:block; font-weight:900; color:#ef4444;">0</span>
            <span style="font-size:7px; color:#555; text-transform:uppercase;">Cancelled</span>
          </div>
        </div>

        <div class="tab-bar">
          <button id="skTabBookings" class="tab-btn active" onclick="switchMerchantTab('bookings')">Bookings</button>
          <button id="skTabInventory" class="tab-btn" onclick="switchMerchantTab('inventory')">Spares</button>
          <button id="skTabCustomers" class="tab-btn" onclick="switchMerchantTab('customers')">Shoppers</button>
        </div>

        <!-- Bookings queue tab -->
        <div id="skBookingsContent" class="sk-tab-view">
          <h3 style="font-size: 13px; font-weight: 900; margin-bottom: 8px; text-transform: uppercase;">Pending Reservations Queue</h3>
          <div id="skReservationsQueue" style="display:flex; flex-direction:column; gap:10px; margin-bottom: 16px;"></div>
        </div>

        <!-- Spares list tab -->
        <div id="skInventoryContent" class="sk-tab-view" style="display:none;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <h3 style="font-size: 13px; font-weight: 900; text-transform: uppercase;">Spares Manager</h3>
            <button class="btn btn-primary" style="padding:3px 8px; font-size:10px; width:auto;" onclick="toggleAddProductForm()">+ Add Spare</button>
          </div>

          <form id="skAddProductForm" style="display:none; padding:10px; margin-bottom:10px; background:#f9fafb;" class="card" onsubmit="skAddProductSubmit(event)">
            <div style="margin-bottom:6px;">
              <label style="font-size:10px; font-weight:800; display:block;">Product Name</label>
              <input type="text" id="skAddName" class="form-input" style="padding:6px; font-size:12px;" required>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;">
              <div>
                <label style="font-size:10px; font-weight:800; display:block;">Price (₹)</label>
                <input type="number" id="skAddPrice" class="form-input" style="padding:6px; font-size:12px;" required>
              </div>
              <div>
                <label style="font-size:10px; font-weight:800; display:block;">Stock</label>
                <select id="skAddStock" class="form-input" style="padding:6px; font-size:12px;">
                  <option value="Available">Available</option>
                  <option value="Likely Available">Likely Available</option>
                  <option value="Out of Stock">Out of Stock</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-accent btn-block" style="padding:6px; font-size:12px;">Add Product</button>
          </form>

          <div id="skProductsList" style="display:flex; flex-direction:column; gap:8px;"></div>
        </div>

        <!-- Shoppers list tab -->
        <div id="skCustomersContent" class="sk-tab-view" style="display:none;">
          <h3 style="font-size:13px; font-weight:900; text-transform:uppercase; margin-bottom:8px;">My Customer Network</h3>
          <div id="skCustomersList" style="display:flex; flex-direction:column; gap:8px;"></div>
        </div>

      </div>

    </div>
  </div>

  <script>
    const db = {
      get(key) { return JSON.parse(localStorage.getItem('dos_' + key) || '[]'); },
      save(key, val) { localStorage.setItem('dos_' + key, JSON.stringify(val)); }
    };

    let activeShopId = '';
    let currentSkTab = 'bookings';

    function loadShopsSelector() {
      const shops = db.get('shops');
      const selector = document.getElementById('shopkeeperSelector');
      selector.innerHTML = '<option value="">-- Choose Store --</option>';
      shops.forEach(s => {
        selector.innerHTML += `<option value="${s.id}">${s.name}</option>`;
      });
    }

    function changeStore(val) {
      if (!val) {
        document.getElementById('merchantDashboard').style.display = 'none';
        return;
      }
      activeShopId = val;
      document.getElementById('merchantDashboard').style.display = 'block';
      renderDashboard();
    }

    function switchMerchantTab(tabKey) {
      currentSkTab = tabKey;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.sk-tab-view').forEach(view => view.style.display = 'none');

      if (tabKey === 'bookings') {
        document.getElementById('skTabBookings').classList.add('active');
        document.getElementById('skBookingsContent').style.display = 'block';
      } else if (tabKey === 'inventory') {
        document.getElementById('skTabInventory').classList.add('active');
        document.getElementById('skInventoryContent').style.display = 'block';
      } else if (tabKey === 'customers') {
        document.getElementById('skTabCustomers').classList.add('active');
        document.getElementById('skCustomersContent').style.display = 'block';
      }
      renderDashboard();
    }

    function renderDashboard() {
      const shop = db.get('shops').find(s => s.id === activeShopId);
      if (!shop) return;

      document.getElementById('skWebsiteLink').innerText = `dukaanos.in/shop/${shop.id}`;
      document.getElementById('skPlanBadge').innerText = `${shop.plan} Plan`;

      const reservations = db.get('reservations').filter(r => r.shopId === activeShopId);
      const confirmed = reservations.filter(r => r.status === 'confirmed');
      const totalSales = confirmed.reduce((sum, r) => sum + r.price, 0);

      document.getElementById('skSales').innerText = totalSales;
      document.getElementById('skCommission').innerText = (totalSales * 0.005).toFixed(2);

      // Reservation Stats counters
      document.getElementById('skStatReserved').innerText = reservations.filter(r => r.status === 'reserved').length;
      document.getElementById('skStatVisited').innerText = reservations.filter(r => r.status === 'visited').length;
      document.getElementById('skStatConfirmed').innerText = confirmed.length;
      document.getElementById('skStatCancelled').innerText = reservations.filter(r => r.status === 'cancelled').length;

      if (currentSkTab === 'bookings') {
        const queueList = document.getElementById('skReservationsQueue');
        queueList.innerHTML = '';
        
        const pending = reservations.filter(r => r.status === 'reserved' || r.status === 'visited');
        if (pending.length === 0) {
          queueList.innerHTML = `<div style="text-align:center; padding:10px; border:1.5px dashed #ccc; border-radius:6px; font-size:12px; color:#555;">No pending bookings.</div>`;
        } else {
          pending.forEach(r => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.padding = '8px';
            card.innerHTML = `
              <div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:4px; margin-bottom:6px; font-size:11px; font-weight:800;">
                <span>CODE: ${r.id}</span>
                <span class="badge" style="background:#e0f2fe; color:#0369a1; border-color:#0369a1;">${r.status}</span>
              </div>
              <div style="font-size:12px; margin-bottom:8px;">
                <strong style="display:block;">${r.productName}</strong>
                <div style="color:#555; margin-top:2px;">Customer: ${r.customerName} (${r.customerPhone})</div>
                <div style="font-weight:800; margin-top:4px;">Collect Cash: <span style="color:var(--primary);">₹${r.price}</span></div>
              </div>
              <div style="display:flex; gap:4px;">
                <button class="btn btn-success" style="padding:4px; font-size:10px; flex:2;" onclick="skConfirmPurchase('${r.id}')">[CONFIRM PURCHASE]</button>
                ${r.status==='reserved' ? `<button class="btn btn-secondary" style="padding:4px; font-size:10px; flex:1;" onclick="skMarkVisited('${r.id}')">Visited</button>` : ''}
                <button class="btn btn-danger" style="padding:4px; font-size:10px;" onclick="skCancelReservation('${r.id}')">Cancel</button>
              </div>
            `;
            queueList.appendChild(card);
          });
        }
      } else if (currentSkTab === 'inventory') {
        const prodList = document.getElementById('skProductsList');
        prodList.innerHTML = '';
        const skProds = db.get('products').filter(p => p.shopId === activeShopId);
        
        if (skProds.length === 0) {
          prodList.innerHTML = `<div style="text-align:center; padding:10px; font-size:12px; color:#666;">No products listed in catalog.</div>`;
          return;
        }

        skProds.forEach(p => {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.padding = '8px';
          card.innerHTML = `
            <div style="display:flex; gap:8px;">
              <img src="${p.image}" class="product-img" style="width:40px; height:40px; border-radius:4px; border:1px solid #111; object-fit:cover;">
              <div style="flex:1;">
                <h4 style="font-size:12px; font-weight:800;">${p.name}</h4>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:4px;">
                  <span style="font-weight:900; font-size:13px; color:var(--primary);">₹${p.price}</span>
                  <select style="font-size:10px; padding:1px; border:1px solid #111;" onchange="skUpdateProductStock('${p.id}', this.value)">
                    <option value="Available" ${p.stockStatus==='Available'?'selected':''}>Available</option>
                    <option value="Likely Available" ${p.stockStatus==='Likely Available'?'selected':''}>Likely</option>
                    <option value="Out of Stock" ${p.stockStatus==='Out of Stock'?'selected':''}>Out of Stock</option>
                  </select>
                </div>
              </div>
            </div>
          `;
          prodList.appendChild(card);
        });
      } else if (currentSkTab === 'customers') {
        const shoppersContainer = document.getElementById('skCustomersList');
        shoppersContainer.innerHTML = '';
        const shopperMap = [];
        confirmed.forEach(c => {
          const matched = shopperMap.find(sm => sm.phone === c.customerPhone);
          if (matched) {
            matched.purchases += c.price;
            matched.rewards += c.rewardCoins;
          } else {
            shopperMap.push({
              name: c.customerName,
              phone: c.customerPhone,
              purchases: c.price,
              rewards: c.rewardCoins
            });
          }
        });

        if (shopperMap.length === 0) {
          shoppersContainer.innerHTML = `<div style="text-align:center; padding:10px; border:1.5px dashed #ccc; border-radius:6px; font-size:12px; color:#555;">No customer network recorded yet.</div>`;
        } else {
          shopperMap.forEach(sm => {
            const item = document.createElement('div');
            item.className = 'card';
            item.style.padding = '8px';
            item.style.marginBottom = '6px';
            item.innerHTML = `
              <div style="display:flex; justify-content:space-between; font-size:12px;">
                <div>
                  <strong>${sm.name}</strong>
                  <div style="font-size:10px; color:#666; margin-top:1px;">${sm.phone}</div>
                  <div style="font-size:9.5px; color:#d97706; margin-top:2px;">SuperCoins: 🪙 ${sm.rewards}</div>
                </div>
                <div style="text-align:right;">
                  <span style="font-size:9px; color:#666; text-transform:uppercase;">Total purchase</span>
                  <div style="font-weight:900; color:var(--primary);">₹${sm.purchases}</div>
                </div>
              </div>
            `;
            shoppersContainer.appendChild(item);
          });
        }
      }
    }

    function skConfirmPurchase(resId) {
      const reservations = db.get('reservations');
      const res = reservations.find(r => r.id === resId);
      if (res) {
        res.status = 'confirmed';
        db.save('reservations', reservations);

        const customers = db.get('customers');
        const cust = customers.find(c => c.id === res.customerId);
        if (cust) {
          cust.superCoins = (cust.superCoins || 0) + res.rewardCoins;
          db.save('customers', customers);
        }

        const shops = db.get('shops');
        const shop = shops.find(s => s.id === res.shopId);
        if (shop) {
          shop.monthlyBuyers = (shop.monthlyBuyers || 0) + 1;
          db.save('shops', shops);
        }
      }
      renderDashboard();
    }

    function skMarkVisited(resId) {
      const reservations = db.get('reservations');
      const res = reservations.find(r => r.id === resId);
      if (res) {
        res.status = 'visited';
        db.save('reservations', reservations);
      }
      renderDashboard();
    }

    function skCancelReservation(resId) {
      const reservations = db.get('reservations');
      const res = reservations.find(r => r.id === resId);
      if (res) {
        res.status = 'cancelled';
        db.save('reservations', reservations);
      }
      renderDashboard();
    }

    function toggleAddProductForm() {
      const form = document.getElementById('skAddProductForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function skAddProductSubmit(e) {
      e.preventDefault();
      const name = document.getElementById('skAddName').value;
      const price = parseFloat(document.getElementById('skAddPrice').value);
      const stock = document.getElementById('skAddStock').value;
      const shop = db.get('shops').find(s => s.id === activeShopId);

      if (!name || !price || !shop) return;

      const products = db.get('products');
      products.push({
        id: 'p_' + Date.now(),
        shopId: activeShopId,
        shopName: shop.name,
        name: name,
        price: price,
        stockStatus: stock,
        category: "Tractor Spares",
        image: "https://images.unsplash.com/photo-1486006920555-c77dce18193b?auto=format&fit=crop&q=80&w=400",
        updatedAt: new Date().toISOString(),
        rewardCoins: Math.ceil(price * 0.01)
      });
      db.save('products', products);

      document.getElementById('skAddName').value = '';
      document.getElementById('skAddPrice').value = '';
      toggleAddProductForm();
      renderDashboard();
    }

    function skUpdateProductStock(prodId, val) {
      const products = db.get('products');
      const prod = products.find(p => p.id === prodId);
      if (prod) {
        prod.stockStatus = val;
        prod.updatedAt = new Date().toISOString();
        db.save('products', products);
      }
      renderDashboard();
    }

    window.onload = () => {
      lucide.createIcons();
      loadShopsSelector();
    };
  </script>
</body>
</html>
